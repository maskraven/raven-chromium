      var comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -50;
      comp.knee.value = 40;
      comp.ratio.value = 12;
      comp.attack.value = 0;
      comp.release.value = 0.25;
      osc.connect(comp);
      comp.connect(ctx.destination);
      osc.start(0);
      return Promise.resolve(ctx.startRendering()).then(function (buf) {
        var data = buf.getChannelData(0);
        // fixed analysis window
        var start = 4000, end = 5000, sum = 0;
        for (var i = start; i < end; i++) sum += Math.abs(data[i]);
        var slice = new Float32Array(end - start);
        for (i = start; i < end; i++) slice[i - start] = data[i];
        var bytes = new Uint8Array(slice.buffer);
        return sha256Hex(bytes).then(function (h) {
          return { supported: true, sampleHash: h, absSum: Number(sum.toFixed(8)), sampleRate: buf.sampleRate, length: buf.length };
        });
      }, function (e) {
        return { supported: false, error: String(e && e.message || e) };
      });
    } catch (e) {
      return Promise.resolve({ supported: false, error: String(e && e.message || e) });
    }
  }

  // ---- fonts (measurement-based) -------------------------------------

  var FONT_CANDIDATES = [
    "Arial", "Arial Black", "Arial Narrow", "Bahnschrift", "Calibri", "Cambria",
    "Candara", "Comic Sans MS", "Consolas", "Constantia", "Corbel", "Courier",
    "Courier New", "DejaVu Sans", "DejaVu Sans Mono", "DejaVu Serif",
    "Ebrima", "Franklin Gothic Medium", "Gabriola", "Gadugi", "Geneva", "Georgia",
    "Helvetica", "Helvetica Neue", "Hiragino Sans", "Impact", "Ink Free",
    "Liberation Mono", "Liberation Sans", "Liberation Serif", "Lucida Console",
    "Lucida Grande", "Lucida Sans Unicode", "MS Gothic", "MS PGothic", "Malgun Gothic",
    "Marlett", "Menlo", "Meiryo", "Microsoft Sans Serif", "Monaco", "MV Boli",
    "Nimbus Sans", "Noto Color Emoji", "Noto Sans", "Noto Serif", "PingFang SC",
    "Palatino Linotype", "Roboto", "Segoe Print", "Segoe Script", "Segoe UI",
    "Segoe UI Emoji", "Segoe UI Historic", "Segoe UI Symbol", "SimSun", "Sitka",
    "Sylfaen", "Symbol", "Tahoma", "Times", "Times New Roman", "Trebuchet MS",
    "Ubuntu", "Verdana", "Webdings", "Wingdings", "Yu Gothic"
  ];

  function collectFonts() {
    try {
      var baseFonts = ["monospace", "serif", "sans-serif"];
      var testString = "mmmmmmmmmmlli WWWWWWWWWW @#% Éç中文";
      var span = document.createElement("span");
      span.style.position = "absolute";
      span.style.left = "-99999px";
      span.style.top = "-99999px";
      span.style.fontSize = "72px";
      span.style.lineHeight = "normal";
      span.style.whiteSpace = "nowrap";
      span.textContent = testString;
      document.body.appendChild(span);
      var base = {};
      for (var b = 0; b < baseFonts.length; b++) {
        span.style.fontFamily = baseFonts[b];
        base[baseFonts[b]] = { w: span.offsetWidth, h: span.offsetHeight };
      }
      var present = [];
      for (var f = 0; f < FONT_CANDIDATES.length; f++) {
        var fam = FONT_CANDIDATES[f], detected = false;
        for (b = 0; b < baseFonts.length; b++) {
          span.style.fontFamily = '"' + fam + '",' + baseFonts[b];
          if (span.offsetWidth !== base[baseFonts[b]].w || span.offsetHeight !== base[baseFonts[b]].h) {
            detected = true; break;
          }
        }
        if (detected) present.push(fam);
      }
      document.body.removeChild(span);
      present.sort();
      return { supported: true, candidateCount: FONT_CANDIDATES.length, presentCount: present.length, present: present };
    } catch (e) {
      return { supported: false, error: String(e && e.message || e) };
    }
  }

  // ---- plugins / mimeTypes -------------------------------------------

  function collectPlugins() {
    var names = safe(function () {
      var out = [];
      if (navigator.plugins) for (var i = 0; i < navigator.plugins.length; i++) out.push(navigator.plugins[i].name);
      return out.sort();
    });
    var mimes = safe(function () {
      var out = [];
      if (navigator.mimeTypes) for (var i = 0; i < navigator.mimeTypes.length; i++) out.push(navigator.mimeTypes[i].type);
      return out.sort();
    });
    return { plugins: names, mimeTypes: mimes };
  }

  // ---- mediaDevices ---------------------------------------------------

  function collectMediaDevices() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
      return Promise.resolve({ supported: false });
    }
    return Promise.resolve(navigator.mediaDevices.enumerateDevices()).then(function (list) {
      var counts = { audioinput: 0, audiooutput: 0, videoinput: 0, other: 0 };
      var labeled = false;
      for (var i = 0; i < list.length; i++) {
        var k = list[i].kind;
        if (counts[k] === undefined) counts.other++; else counts[k]++;
        if (list[i].label && list[i].label.length > 0) labeled = true;
      }
      return { supported: true, counts: counts, total: list.length, labelsPopulated: labeled };
    }, function (e) {
      return { supported: false, error: String(e && e.message || e) };
    });
  }

  // ---- speechSynthesis voices ----------------------------------------

  function getVoicesAsync(maxWaitMs) {
    return new Promise(function (resolve) {
      if (!("speechSynthesis" in window)) { resolve(null); return; }
      var ss = window.speechSynthesis;
      var got = ss.getVoices();
      if (got && got.length) { resolve(got); return; }
      var settled = false;
      function done() {
        if (settled) return; settled = true;
        try { ss.removeEventListener("voiceschanged", onChange); } catch (e) {}
        resolve(ss.getVoices() || []);
      }
      function onChange() { done(); }
      try { ss.addEventListener("voiceschanged", onChange); } catch (e) {}
      setTimeout(done, maxWaitMs);
    });
  }

  function collectVoices() {
    return getVoicesAsync(1500).then(function (voices) {
      if (voices === null) return { supported: false };
      var list = voices.map(function (v) { return { name: v.name, lang: v.lang }; });
      list.sort(function (a, b) {
        if (a.name < b.name) return -1; if (a.name > b.name) return 1;
        return a.lang < b.lang ? -1 : (a.lang > b.lang ? 1 : 0);
      });
      return { supported: true, count: list.length, voices: list };
    });
  }

  // ---- WebRTC ---------------------------------------------------------

  function collectWebRTC() {
    var ctor = window.RTCPeerConnection || window.webkitRTCPeerConnection || window.mozRTCPeerConnection;
    var present = !!ctor;
    var out = { rtcPeerConnectionPresent: present, status: present ? "enabled" : "disabled" };
    if (present) {
      // Try constructing — Raven hard-disables RTC, which may surface as a throw.
      try {
        var pc = new ctor(null);
        out.constructable = true;
        try { pc.close(); } catch (e) {}
      } catch (e) {
        out.constructable = false;
        out.constructError = String(e && e.message || e);
      }
    }
    out.dataChannelPresent = safe(function () { return typeof RTCDataChannel !== "undefined"; });
    return out;
  }

  // ---- feature presence ----------------------------------------------

  function collectFeatures() {
    return {
      performanceMemoryPresent: safe(function () { return !!(window.performance && window.performance.memory); }),
      cryptoSubtlePresent: safe(function () { return !!(window.crypto && window.crypto.subtle); }),
      webglPresent: safe(function () {
        var c = document.createElement("canvas");
        return !!(c.getContext("webgl") || c.getContext("experimental-webgl"));
      }),
      webgpuPresent: safe(function () { return !!navigator.gpu; }),
      offlineAudioPresent: safe(function () { return !!(window.OfflineAudioContext || window.webkitOfflineAudioContext); }),
      speechSynthesisPresent: safe(function () { return "speechSynthesis" in window; }),
      usbPresent: safe(function () { return !!navigator.usb; }),
      bluetoothPresent: safe(function () { return !!navigator.bluetooth; }),
      keyboardLayoutMapPresent: safe(function () { return !!(navigator.keyboard && navigator.keyboard.getLayoutMap); }),
      geolocationPresent: safe(function () { return !!navigator.geolocation; })
    };
  }

  // ---- orchestration --------------------------------------------------

  function setStatus(text, cls) {
    var el = document.getElementById("status");
    el.textContent = text; el.className = cls;
  }

  function finalize(snapshot) {
    var canonical = canonicalize(snapshot);
    return sha256Text(canonical).then(function (hash) {
      var pretty = JSON.stringify(sortedClone(snapshot), null, 2);
      window.__RAVEN_FP__ = { hash: hash, snapshot: snapshot, canonical: canonical, probeVersion: PROBE_VERSION };
      document.title = "FP:" + hash;
      var hashEl = document.getElementById("hash");
      hashEl.textContent = hash; hashEl.className = "";
      var jsonEl = document.getElementById("json");
      jsonEl.textContent = pretty; jsonEl.className = "";
      setStatus("done", "done");
      var ready = document.getElementById("ready");
      ready.setAttribute("data-ready", "1");
      ready.textContent = "ready";
      return hash;
    });
  }

  function main() {
    var snapshot = {
      schema: { probe: "raven-fingerprint-probe", version: PROBE_VERSION }
    };
    // synchronous surfaces
    snapshot.navigator = collectNavigator();
    snapshot.screen = collectScreen();
    snapshot.window = collectWindow();
    snapshot.intl = collectIntl();
    snapshot.plugins = collectPlugins();
    snapshot.webrtc = collectWebRTC();
    snapshot.features = collectFeatures();
    snapshot.fonts = collectFonts();

    // async surfaces (each defended + timeboxed so #ready always fires)
    var jobs = [
      withTimeout(collectUserAgentData(), 3000, UNAVAILABLE).then(function (v) { snapshot.navigator.userAgentData = v; }),
      withTimeout(collectCanvas(), 4000, { supported: false, error: "timeout" }).then(function (v) { snapshot.canvas = v; }),
      withTimeout(collectWebGL("webgl"), 5000, { supported: false, error: "timeout" }).then(function (v) { snapshot.webgl1 = v; }),
      withTimeout(collectWebGL("webgl2"), 5000, { supported: false, error: "timeout" }).then(function (v) { snapshot.webgl2 = v; }),
      withTimeout(collectWebGPU(), 6000, { available: false, error: "timeout" }).then(function (v) { snapshot.webgpu = v; }),
      withTimeout(collectAudio(), 6000, { supported: false, error: "timeout" }).then(function (v) { snapshot.audio = v; }),
      withTimeout(collectMediaDevices(), 4000, { supported: false, error: "timeout" }).then(function (v) { snapshot.mediaDevices = v; }),
      withTimeout(collectVoices(), 2500, { supported: false, error: "timeout" }).then(function (v) { snapshot.speechSynthesis = v; })
    ];

    return Promise.all(jobs).then(function () {
      return finalize(snapshot);
    }).catch(function (e) {
      snapshot.probeError = String(e && e.message || e);
      return finalize(snapshot);
    });
  }

  // Kick off once (script is at end of body → DOM is present).
  try {
    main();
  } catch (e) {
    setStatus("probe error: " + (e && e.message || e), "pending");
    var ready = document.getElementById("ready");
    if (ready) { ready.setAttribute("data-ready", "1"); ready.textContent = "ready (error)"; }
  }
})();
</script>
